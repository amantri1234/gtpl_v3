# ============================================
# GTPLUG Underground Work Management System
# Application Configuration
# ============================================

# Application Info
app.name=GTPLUG Underground Work Management System
app.version=1.0.0
app.environment=${ENVIRONMENT:development}

# ============================================
# Database Configuration (HikariCP)
# ============================================
db.driver=com.mysql.cj.jdbc.Driver
db.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:gtplug_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata&useUnicode=true&characterEncoding=UTF-8
db.username=${DB_USER:root}
db.password=${DB_PASSWORD:root}

# HikariCP Settings
db.pool.size.max=20
db.pool.size.min=5
db.pool.connection.timeout=30000
db.pool.idle.timeout=600000
db.pool.max.lifetime=1800000
db.pool.leak.detection.threshold=60000

# ============================================
# JWT Configuration
# ============================================
jwt.secret=${JWT_SECRET:gtplugSuperSecretKeyForJwtTokenGeneration2024}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.issuer=gtplug-ug-work-system
jwt.audience=gtplug-users

# ============================================
# Server Configuration
# ============================================
server.port=8080
server.host=0.0.0.0
server.context.path=/

# ============================================
# Security Configuration
# ============================================
security.bcrypt.rounds=10
security.session.timeout=${SESSION_TIMEOUT:3600000}
security.csrf.enabled=true
security.rate.limit.enabled=true
security.rate.limit.requests=${RATE_LIMIT_REQUESTS:100}
security.rate.limit.window=${RATE_LIMIT_WINDOW:60000}
security.account.lock.attempts=5
security.account.lock.duration=1800000

# ============================================
# File Upload Configuration
# ============================================
upload.directory=${UPLOAD_DIR:./uploads}
upload.max.file.size=10485760
upload.allowed.extensions=jpg,jpeg,png,gif,webp
upload.image.max.width=2048
upload.image.max.height=2048

# ============================================
# Logging Configuration
# ============================================
logging.level.root=INFO
logging.level.com.gtplug=DEBUG
logging.level.io.javalin=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================
# Template Configuration (Thymeleaf)
# ============================================
thymeleaf.cache=${THYMELEAF_CACHE:false}
thymeleaf.prefix=/templates/
thymeleaf.suffix=.html
thymeleaf.mode=HTML
thymeleaf.encoding=UTF-8

# ============================================
# PWA Configuration
# ============================================
pwa.name=GTPLUG Work Manager
pwa.short.name=GTPLUG
pwa.theme.color=#0f172a
pwa.background.color=#ffffff
pwa.display=standalone
pwa.orientation=portrait
