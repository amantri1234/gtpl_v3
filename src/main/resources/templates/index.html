<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/main :: layout(~{::title}, ~{::body})}">
    <title>Welcome</title>
</head>
<body class="bg-gradient-to-br from-primary to-secondary min-h-screen flex items-center justify-center">
    <div class="text-center text-white px-4">
        <div class="mb-8">
            <div class="w-24 h-24 bg-accent rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-2xl">
                <svg class="w-14 h-14 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
            </div>
            <h1 class="text-4xl md:text-6xl font-bold mb-4">GTPLUG</h1>
            <p class="text-xl md:text-2xl text-gray-300 mb-2">Underground Work Management System</p>
            <p class="text-gray-400">Efficiently manage UG cable installation projects</p>
        </div>
        
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/login" class="bg-accent hover:bg-blue-600 text-white font-semibold py-3 px-8 rounded-lg transition duration-300 shadow-lg">
                Login
            </a>
            <a href="/vendor/signup" class="bg-white/10 hover:bg-white/20 text-white font-semibold py-3 px-8 rounded-lg transition duration-300 backdrop-blur">
                Vendor Registration
            </a>
        </div>
        
        <div class="mt-12 grid grid-cols-1 md:grid-cols-3 gap-6 max-w-4xl mx-auto">
            <div class="bg-white/5 backdrop-blur rounded-xl p-6">
                <div class="w-12 h-12 bg-green-500/20 rounded-lg flex items-center justify-center mb-4 mx-auto">
                    <svg class="w-6 h-6 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <h3 class="font-semibold mb-2">Project Tracking</h3>
                <p class="text-sm text-gray-400">Real-time progress monitoring</p>
            </div>
            <div class="bg-white/5 backdrop-blur rounded-xl p-6">
                <div class="w-12 h-12 bg-blue-500/20 rounded-lg flex items-center justify-center mb-4 mx-auto">
                    <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <h3 class="font-semibold mb-2">Daily Updates</h3>
                <p class="text-sm text-gray-400">Track work completion daily</p>
            </div>
            <div class="bg-white/5 backdrop-blur rounded-xl p-6">
                <div class="w-12 h-12 bg-purple-500/20 rounded-lg flex items-center justify-center mb-4 mx-auto">
                    <svg class="w-6 h-6 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                    </svg>
                </div>
                <h3 class="font-semibold mb-2">Material Requests</h3>
                <p class="text-sm text-gray-400">Manage material requirements</p>
            </div>
        </div>
    </div>
</body>
</html>
